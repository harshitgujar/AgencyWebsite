<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>monopo — london</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #1a0a2e;
      font-family: 'Inter', sans-serif;
      cursor: none;
    }

    #gl {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.13;
      mix-blend-mode: overlay;
    }

    /* Cursor */
    #cursor-dot {
      position: fixed;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4a1a8a;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: multiply;
    }

    #cursor-circle {
      position: fixed;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 1px solid rgba(80, 30, 160, 0.45);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
    }

    /* UI */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    #ui * {
      pointer-events: auto;
    }

    nav {
      display: flex;
      align-items: flex-start;
      padding: 20px 28px;
      gap: 0;
      animation: fadeIn .7s .1s both;
    }

    .logo {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .01em;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 160px;
    }

    .logo .sep {
      opacity: 0.4;
    }

    .nav-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      max-width: 480px;
    }

    .nav-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-col a {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(20, 5, 50, 0.85);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      width: fit-content;
    }

    .nav-col a .arr {
      font-size: 7px;
      opacity: 0.8;
    }

    .nav-col a:hover {
      opacity: 0.65;
    }

    .nav-times {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 110px;
      text-align: right;
    }

    .nav-times .t {
      font-size: 10.5px;
      letter-spacing: .07em;
      color: rgba(20, 5, 50, 0.80);
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .nav-times .t .td {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(80, 30, 140, 0.35);
    }

    .nav-times .t.on .td {
      background: rgba(100, 40, 200, 0.85);
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn .9s .3s both;
    }

    .hero h1 {
      font-size: clamp(38px, 6vw, 88px);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -.015em;
      text-align: center;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 20px 28px;
      animation: fadeIn .7s .5s both;
    }

    .bi .bl {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .bi .bs {
      font-size: 12px;
      font-weight: 300;
      color: rgba(20, 5, 50, .55);
    }

    .arrow {
      font-size: 18px;
      opacity: .65;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <canvas id="gl"></canvas>
  <canvas id="grain"></canvas>
  <div id="cursor-dot"></div>
  <div id="cursor-circle"></div>

  <div id="ui">
    <nav>
      <div class="logo">monopo <span class="sep">|</span> london</div>
      <div class="nav-grid">
        <div class="nav-col">
          <a href="#"><span class="arr">▶</span>HOME</a>
          <a href="#">WORK</a>
          <a href="#">SERVICES</a>
        </div>
        <div class="nav-col">
          <a href="#">TEAM</a>
          <a href="#">CONTACT</a>
          <a href="#">PRESS &amp; NEWS</a>
        </div>
      </div>
      <div class="nav-times">
        <div class="t on"><span class="td"></span><span id="tLon">—</span></div>
        <div class="t"><span id="tNy">—</span></div>
        <div class="t"><span id="tTok">—</span></div>
      </div>
    </nav>

    <div class="hero">
      <h1>We are a brand<br>of collective<br>creativity</h1>
    </div>

    <div class="bottom">
      <div class="bi">
        <div class="bl">Based in London</div>
        <div class="bs">Born in Tokyo</div>
      </div>
      <div class="bi">
        <div class="bl">Design-driven</div>
        <div class="bs">creative agency</div>
      </div>
      <div class="bi">
        <div class="bl">Branding, digital</div>
        <div class="bs">and communications</div>
      </div>
      <div class="arrow">↓</div>
    </div>
  </div>

  <script>
    /* ── Clocks ── */
    function tick() {
      const f = (tz) => new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: tz });
      document.getElementById('tLon').textContent = f('Europe/London');
      document.getElementById('tNy').textContent = f('America/New_York');
      document.getElementById('tTok').textContent = f('Asia/Tokyo');
    }
    tick(); setInterval(tick, 1000);

    /* ══════════════════════════════════════════════════════════
       WEBGL GRADIENT
       
       Behaviour from video:
       • 4–5 large blob masses fill the screen (orange + navy)
       • As mouse moves, the ENTIRE gradient field gently tilts
         — orange mass leans toward cursor, navy retreats
       • A dark translucent ring appears around cursor
    ══════════════════════════════════════════════════════════ */
    (function () {
      const cv = document.getElementById('gl');
      const gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
      if (!gl) return;

      const VS = `
    attribute vec2 a_pos;
    void main(){ gl_Position = vec4(a_pos,0.,1.); }
  `;

      const FS = `
    precision highp float;
    uniform vec2  u_res;
    uniform float u_time;
    uniform vec2  u_mouse;

    /* value noise */
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float vnoise(vec2 p){
      vec2 i=floor(p), f=fract(p)*fract(p)*(3.-2.*fract(p));
      return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
    }
    float fbm(vec2 p){
      float v=0.,a=.5; for(int i=0;i<4;i++){v+=a*vnoise(p);p*=2.1;a*=.5;} return v;
    }

    /* Smooth radial blob weight */
    float blob(vec2 uv, vec2 c, float r, float ar){
      vec2 d = (uv - c) * vec2(ar, 1.);
      float w = max(0., 1. - length(d)/r);
      return w * w * w;  /* cubic falloff — softer edges */
    }

    void main(){
      vec2 uv  = gl_FragCoord.xy / u_res;
      uv.y     = 1. - uv.y;
      float ar = u_res.x / u_res.y;
      float T  = u_time * 0.55;   /* fast flame time */

      vec2 mo = vec2(0.0);

      /* animMask: full strength at top, zero below y=0.60 */
      float animMask = smoothstep(0.62, 0.10, uv.y);

      /* ── Upward flame rise: UV scrolls upward fast in top zone ── */
      vec2 flameUV = uv;
      flameUV.y -= T * 0.28 * animMask;          /* flames rise upward */
      flameUV.x += sin(uv.y * 6.0 + T * 1.8) * 0.04 * animMask;  /* side sway */

      /* ── Layer 1: large slow smoke billows ── */
      vec2 q1 = vec2(
        fbm(flameUV * 1.8 + vec2(0.0, 0.0) + T * 0.40),
        fbm(flameUV * 1.8 + vec2(5.2, 1.3) + T * 0.35)
      );
      vec2 r1 = vec2(
        fbm(flameUV * 2.2 + 5.0*q1 + vec2(1.7, 9.2) + T * 0.30),
        fbm(flameUV * 2.2 + 5.0*q1 + vec2(8.3, 2.8) + T * 0.28)
      );

      /* ── Layer 2: fast sharp flame tongues ── */
      vec2 q2 = vec2(
        fbm(flameUV * 4.5 + vec2(2.1, 7.4) + T * 1.10),
        fbm(flameUV * 4.5 + vec2(9.3, 3.1) + T * 0.95)
      );

      /* Combine: big warp + sharp tongue warp, masked to top */
      float warpAmt = animMask;
      vec2 smokeUV = uv
        + warpAmt * (0.52 * r1 + 0.28 * q1)   /* large billowing */
        + warpAmt * 0.18 * q2;                  /* sharp tongue detail */

      /* ── Blob centres ── */
      vec2 p0 = vec2(-0.08 + .06*sin(T*.9),   1.10 + .06*cos(T*.7));
      vec2 p1 = vec2( 1.10 + .05*cos(T*.85),  1.08 + .05*sin(T*.75));
      vec2 p2 = vec2( 1.12 + .04*sin(T*.7+1.), 0.55 + .06*cos(T*.6+.5));
      vec2 p3 = vec2(-0.14 + .07*cos(T*.8+2.), -0.12 + .05*sin(T*.6+.8));
      vec2 p4 = vec2( 0.50 + .08*sin(T*.6+3.), -0.10 + .06*cos(T*.55+1.));
      vec2 p5 = vec2(-0.12 + .06*sin(T*.7+4.),  0.40 + .07*cos(T*.65+2.));

      /* Sample blobs on smoke-warped UV */
      float w0 = blob(smokeUV, p0, 0.95, ar);
      float w1 = blob(smokeUV, p1, 0.88, ar);
      float w2 = blob(smokeUV, p2, 0.78, ar);
      float w3 = blob(smokeUV, p3, 0.82, ar);
      float w4 = blob(smokeUV, p4, 0.72, ar);
      float w5 = blob(smokeUV, p5, 0.66, ar);

      float vWarp = clamp(smokeUV.y, 0., 1.);

      /* ── Palette ── */
      vec3 cFlame  = vec3(0.58, 0.05, 1.00);
      vec3 cFlame2 = vec3(0.85, 0.15, 1.00);
      vec3 cLav    = vec3(0.93, 0.82, 1.00);
      vec3 cSmoke  = vec3(0.929, 0.855, 0.988);

      vec3 grad = mix(cFlame,  cFlame2, smoothstep(0.00, 0.22, vWarp));
           grad = mix(grad,    cLav,    smoothstep(0.20, 0.52, vWarp));
           grad = mix(grad,    cSmoke,  smoothstep(0.48, 0.72, vWarp));

      float wSum = w0+w1+w2+w3+w4+w5;
      vec3 blobTint = vec3(0.);
      blobTint += w0 * vec3(0.68, 0.08, 1.00);
      blobTint += w1 * vec3(0.88, 0.18, 1.00);
      blobTint += w2 * vec3(1.00, 0.97, 1.00);
      blobTint += w3 * vec3(0.94, 0.78, 1.00);
      blobTint += w4 * vec3(0.98, 0.95, 1.00);
      blobTint += w5 * vec3(0.78, 0.28, 0.98);

      vec3 blobNorm = blobTint / max(wSum, 0.01);
      float cov = clamp(wSum * 1.1, 0., 1.);
      vec3 col = mix(grad, blobNorm, cov * 0.60);

      /* ── flameMask: purely top zone ── */
      float flameMask = smoothstep(0.62, 0.02, vWarp) * animMask;

      /* ── Fast multi-layer flicker ── */
      float flick1 = fbm(smokeUV * 5.5 + T * 2.20);   /* rapid fine flicker  */
      float flick2 = fbm(smokeUV * 2.8 + T * 1.40);   /* medium pulse        */
      float flick3 = fbm(smokeUV * 8.0 + T * 3.50);   /* ultra-fast sparkle  */
      float flicker = (flick1 * 0.50 + flick2 * 0.35 + flick3 * 0.15);

      /* Hue shift: deep violet ↔ hot magenta driven by flicker */
      col = mix(col, col * vec3(0.72, 0.28, 1.30), flicker * flameMask * 0.80);
      /* Brightness bursts — sharp bright tongues */
      col += flicker * flicker * flameMask * 0.22 * vec3(0.75, 0.30, 1.00);

      /* ── Rising smoke tendrils: vertical streaks ── */
      float tendril = fbm(vec2(smokeUV.x * 6.0, smokeUV.y * 2.5 - T * 1.8)) * animMask;
      col += tendril * flameMask * 0.12 * vec3(0.55, 0.10, 0.95);

      /* ── Density modulation ── */
      float density = fbm(smokeUV * 3.0 + T * 0.55);
      density = pow(density, 1.2);
      /* Only modulate top; bottom stays flat bright white */
      float densityMask = animMask;
      col *= (1.0 - densityMask * 0.22) + densityMask * density * 0.38;

      /* Saturation punch in flame zone */
      vec3 saturated = col * vec3(0.80, 0.55, 1.25);
      col = mix(col, saturated, density * flameMask * 0.70);

      /* Hard floor: pure white at bottom, pale lavender at top minimum */
      float bottomWhite = smoothstep(0.55, 0.85, vWarp);
      vec3 floorCol = mix(vec3(0.68, 0.58, 0.82), vec3(0.929, 0.855, 0.988), bottomWhite);
      col = max(col, floorCol);

      gl_FragColor = vec4(clamp(col, 0., 1.), 1.0);
    }
  `;

      function mkS(t, s) { const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh); return sh; }
      const pr = gl.createProgram();
      gl.attachShader(pr, mkS(gl.VERTEX_SHADER, VS));
      gl.attachShader(pr, mkS(gl.FRAGMENT_SHADER, FS));
      gl.linkProgram(pr); gl.useProgram(pr);

      const bf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, bf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
      const ap = gl.getAttribLocation(pr, 'a_pos');
      gl.enableVertexAttribArray(ap);
      gl.vertexAttribPointer(ap, 2, gl.FLOAT, false, 0, 0);

      const uR = gl.getUniformLocation(pr, 'u_res');
      const uT = gl.getUniformLocation(pr, 'u_time');
      const uM = gl.getUniformLocation(pr, 'u_mouse');

      let W, H;
      function resize() {
        W = window.innerWidth; H = window.innerHeight;
        const pr2 = Math.min(window.devicePixelRatio || 1, 2);
        cv.width = W * pr2 | 0; cv.height = H * pr2 | 0;
        cv.style.width = W + 'px'; cv.style.height = H + 'px';
        gl.viewport(0, 0, cv.width, cv.height);
      }
      resize(); /* initial size — resize+redraw handled in draw block */

      function draw(ts) {
        gl.uniform2f(uR, cv.width, cv.height);
        gl.uniform1f(uT, ts * 0.001);
        gl.uniform2f(uM, 0.5, 0.5);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
      window.addEventListener('resize', () => { resize(); });
    })();

    /* ══════════════════════════════════════════════════════════
       STATIC GRAIN  — single frame, no animation
    ══════════════════════════════════════════════════════════ */
    (function () {
      const c = document.getElementById('grain');
      const ctx = c.getContext('2d');
      const T = 160;
      const off = Object.assign(document.createElement('canvas'), { width: T, height: T });
      const ox = off.getContext('2d');

      function draw() {
        c.width = window.innerWidth; c.height = window.innerHeight;
        const id = ox.createImageData(T, T), d = id.data;
        let seed = 0x12345678;
        function rnd() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; }
        for (let i = 0; i < d.length; i += 4) { const v = rnd() * 255 | 0; d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255; }
        ox.putImageData(id, 0, 0);
        const p = ctx.createPattern(off, 'repeat');
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.fillStyle = p; ctx.fillRect(0, 0, c.width, c.height);
      }
      draw();
      window.addEventListener('resize', draw);
    })();

    /* ══════════════════════════════════════════════════════════
       CURSOR
    ══════════════════════════════════════════════════════════ */
    (function () {
      const dot = document.getElementById('cursor-dot');
      const ring = document.getElementById('cursor-circle');
      let cx = -300, cy = -300, rx = -300, ry = -300;
      window.addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY; });
      (function loop() {
        rx += (cx - rx) * .13; ry += (cy - ry) * .13;
        dot.style.left = cx + 'px'; dot.style.top = cy + 'px';
        ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
        requestAnimationFrame(loop);
      })();
    })();
  </script>
</body>

</html>
